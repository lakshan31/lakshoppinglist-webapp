apiVersion: apps/v1
kind: Deployment
metadata:
  name: lak-frontend
  namespace: lak-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lak-frontend
  template:
    metadata:
      labels:
        app: lak-frontend
    spec:
      containers:
        - name: lak-frontend
          image: lakshoppinglist-frontend:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
