apiVersion: apps/v1
kind: Deployment
metadata:
  name: lak-frontend
  namespace: lak-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lak-frontend
  template:
    metadata:
      labels:
        app: lak-frontend
    spec:
      containers:
        - name: lak-frontend
          image: lakshan31/lakshoppinglist-frontend:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 80